services:
  aperol:
    build: .
    container_name: aperol-index
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # nur lokal – Zugriff von außen läuft über nginx
    volumes:
      - aperol-data:/app/data
    environment:
      - PORT=3000
      - DB_PATH=/app/data/aperol.db
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - GOOGLE_MAPS_KEY=${GOOGLE_MAPS_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    env_file:
      - path: .env
        required: false

volumes:
  aperol-data:
