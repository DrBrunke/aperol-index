# nginx-Vhost für den Aperol Index (Reverse-Proxy auf den Docker-Container).
# 1) <DOMAIN> ersetzen (z.B. aperol.deinedomain.de)
# 2) nach /etc/nginx/sites-available/aperol kopieren, verlinken, testen, reloaden
# 3) HTTPS mit:  sudo certbot --nginx -d <DOMAIN>
#    (certbot ergänzt den 443-Block + Zertifikat automatisch)

server {
    listen 80;
    listen [::]:80;
    server_name <DOMAIN>;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
